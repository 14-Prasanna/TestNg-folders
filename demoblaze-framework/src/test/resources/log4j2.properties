
rootLogger.level = DEBUG
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = RollingFileAppender

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

appender.file.type = RollingFile
appender.file.name = RollingFileAppender
appender.file.fileName = logs/demoblaze-automation.log
appender.file.filePattern = logs/demoblaze-automation-%d{yyyy-MM-dd}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 10

logger.demoblaze.name = com.demoblaze
logger.demoblaze.level = DEBUG
logger.demoblaze.additivity = false
logger.demoblaze.appenderRefs = console, file
logger.demoblaze.appenderRef.console.ref = ConsoleAppender
logger.demoblaze.appenderRef.file.ref = RollingFileAppender


logger.selenium.name = org.openqa.selenium
logger.selenium.level = WARN

logger.apache.name = org.apache
logger.apache.level = WARN
